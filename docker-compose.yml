services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-education}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-education}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-education}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ['dev', 'tools']
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@education.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change-me}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2.8.4-alpine
    profiles: ['prod']
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:80/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ['prod']
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: https://${APP_DOMAIN:-localhost}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-education}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-education}}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      COOKIE_SECURE: 'true'
      CSRF_SECRET: ${CSRF_SECRET}
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:4000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    profiles: ['prod']
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:80/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
