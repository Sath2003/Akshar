services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-education}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-education}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-education}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      NODE_ENV: development
      PORT: 4000
      LOG_LEVEL: debug
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: ${DATABASE_URL:-postgresql://education:change-me@postgres:5432/education}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always
    ports:
      - '5173:80'

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ['tools']
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@education.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change-me}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
